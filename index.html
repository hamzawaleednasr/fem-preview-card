<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Preview Card | Second Challenge</title>

    <link rel="icon" type="image/x-icon" href="imgs/favicon-32x32.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <section class="card">
      <figure class="card-image">
        <img src="imgs/illustration-article.svg" alt="article image" />
      </figure>
      <article class="card-content">
        <div class="info">
          <p class="tag">Learning</p>
          <p class="date">Published 21 Dec 2023</p>
        </div>
        <div class="main-content">
          <h1 class="title">HTML & CSS foundations</h1>
          <p class="desc">
            These languages are the backbone of every website, defining
            structure, content, and presentation.
          </p>
        </div>
        <div class="author">
          <img src="imgs/image-avatar.webp" alt="author avatar" class="avatar">
          <p class="name">Greg Hooper</p>
        </div>
      </article>
    </section>
  </body>
</html>
